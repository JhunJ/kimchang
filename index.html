<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>김창열 물방울 — Pretext + WebGL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #1a1814;
        overflow: hidden;
      }
      #app {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      .stage {
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .bg-editor {
        flex-shrink: 0;
        width: 100%;
        max-width: 1100px;
        margin: 0 auto;
        padding: 10px 12px 14px;
        background: linear-gradient(180deg, rgba(26, 24, 20, 0.92), #141210);
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        z-index: 2;
      }
      .bg-editor label {
        display: block;
        font:
          13px/1.4 system-ui,
          sans-serif;
        color: rgba(255, 255, 255, 0.72);
        margin-bottom: 6px;
      }
      .bg-editor textarea {
        width: 100%;
        min-height: 72px;
        max-height: 160px;
        resize: vertical;
        padding: 10px 12px;
        font:
          14px/1.45 "Noto Serif KR",
          serif;
        color: #e8e4dc;
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        outline: none;
      }
      .bg-editor textarea:focus {
        border-color: rgba(180, 160, 120, 0.45);
      }
      .bg-editor .hint {
        font:
          11px/1.35 system-ui,
          sans-serif;
        color: rgba(255, 255, 255, 0.38);
        margin-top: 6px;
      }
      .font-size-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
        padding: 8px 10px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      .font-size-row label {
        margin: 0;
        flex-shrink: 0;
        font-size: 13px;
      }
      .font-size-row input[type='range'] {
        flex: 1;
        min-width: 80px;
        accent-color: #b8a070;
      }
      .font-size-row .font-size-val {
        flex-shrink: 0;
        min-width: 3.2em;
        font:
          12px/1.4 ui-monospace,
          monospace;
        color: rgba(255, 255, 255, 0.55);
        text-align: right;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="stage" class="stage"></div>
      <div class="bg-editor">
        <label for="bg-text">뒤쪽 신문 글자 (굴절·물방울 효과에 그대로 반영)</label>
        <textarea
          id="bg-text"
          spellcheck="false"
          autocomplete="off"
          placeholder="한글·한자 등 입력… 비우면 기본 신문 본문이 사용됩니다."
        ></textarea>
        <div
          class="font-size-row"
          title="슬라이더 조절 또는 이 영역에서 마우스 휠로 크기 변경"
        >
          <label for="bg-font-size">글자 크기</label>
          <input
            id="bg-font-size"
            type="range"
            min="11"
            max="120"
            step="1"
            value="15"
          />
          <span id="bg-font-size-val" class="font-size-val">15px</span>
        </div>
        <div
          class="font-size-row"
          id="drop-size-row"
          title="슬라이더 또는 이 줄에서 마우스 휠로 물방울 크기 조절 (100% = 기본)"
        >
          <label for="drop-size">물방울 크기</label>
          <input
            id="drop-size"
            type="range"
            min="35"
            max="280"
            step="1"
            value="100"
          />
          <span id="drop-size-val" class="font-size-val">100%</span>
        </div>
        <div
          class="font-size-row"
          id="drop-count-row"
          title="슬라이더 또는 이 줄에서 마우스 휠로 물방울 개수 (최대 64개)"
        >
          <label for="drop-count">물방울 개수</label>
          <input
            id="drop-count"
            type="range"
            min="1"
            max="64"
            step="1"
            value="1"
          />
          <span id="drop-count-val" class="font-size-val">1개</span>
        </div>
        <p class="hint">
          본문·글자 크기·물방울 크기·개수는 이 브라우저에 저장됩니다. 공백·줄바꿈은 배치
          시 무시되고, 기존과 같은 종단·농담 효과로 그려집니다.
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
